<!DOCTYPE html>

<body class="bg-gradient-to-br from-blue-100 to-blue-200 min-h-screen p-2 sm:p-4">
    <div id="app"></div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAMIBURdvMogIeHP4u36I18NaSwOPLcQQQ",
            authDomain: "carnet-entrainement-step.firebaseapp.com",
            databaseURL: "https://carnet-entrainement-step-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "carnet-entrainement-step",
            storageBucket: "carnet-entrainement-step.firebasestorage.app",
            messagingSenderId: "545085492516",
            appId: "1:545085492516:web:f5bfede04fc7442514b7b1"
        };

        // Initialisation Firebase
        let db;
        let isFirebaseReady = false;
        
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            isFirebaseReady = true;
            console.log("✅ Firebase initialisé avec succès");
        } catch (error) {
            console.error("❌ Erreur Firebase:", error);
            isFirebaseReady = false;
        }

        let state = {
            currentPage: 0,
            viewMode: 'student',
            studentId: '',
            selectedClasse: '',
            allStudents: [],
            isTeacherAuthenticated: false,
            profileData: { nom: '', prenom: '', classe: '', age: '', sexe: 'garcon', fcRepos: '', theme: 'theme1' },
            sessions: Array(8).fill(null).map((_, i) => ({
                id: i + 1, date: '', locked: false, 
                series: [
                    { num: 1, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 2, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 3, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 4, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 5, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 6, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 7, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 8, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' }
                ],
                                    fcApres: '', souffle: '', transpiration: '', sensations: '', bilan: '',
                    fcReussie: '', difficulteGlobale: '', fatigue: '', transpirationNiveau: '',
                fcReussie: '', difficulteGlobale: '', fatigue: '', transpirationNiveau: ''
            }))
        };

        // MOT DE PASSE PROFESSEUR - À MODIFIER !
        const TEACHER_PASSWORD = "prof2025";

        // Fonction pour charger les données depuis Firebase
        function loadDataFromFirebase() {
            if (!isFirebaseReady || !state.studentId) return;
            
            db.ref('students/' + state.studentId).once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.profile) state.profileData = data.profile;
                    if (data.sessions) state.sessions = data.sessions;
                    render();
                }
            }).catch((error) => {
                console.error("Erreur de chargement:", error);
                loadDataFromLocal();
                render();
            });
        }

        // Fonction de sauvegarde vers Firebase
        function saveDataToFirebase() {
            if (!state.studentId) { 
                alert('⚠️ Entrez votre identifiant'); 
                return; 
            }

            const dataToSave = {
                profile: state.profileData,
                sessions: state.sessions,
                lastUpdate: new Date().toISOString()
            };

            console.log('🔍 DEBUG - Sauvegarde pour:', state.studentId);
            console.log('🔍 DEBUG - Firebase ready:', isFirebaseReady);

            if (isFirebaseReady) {
                console.log('🔍 DEBUG - Envoi vers Firebase...');
                db.ref('students/' + state.studentId).set(dataToSave)
                    .then(() => {
                        console.log('✅ DEBUG - Firebase OK !');
                        alert('✅ Enregistré sur le serveur');
                        saveDataToLocal();
                    })
                    .catch((error) => {
                        console.error("❌ DEBUG - Erreur Firebase:", error);
                        console.error("❌ Code:", error.code);
                        console.error("❌ Message:", error.message);
                        alert('⚠️ Erreur: ' + error.message);
                        saveDataToLocal();
                    });
            } else {
                console.log('⚠️ DEBUG - Firebase offline');
                saveDataToLocal();
                alert('✅ Enregistré localement (mode hors ligne)');
            }
        }

        // Fonctions de stockage local (backup)
        function saveDataToLocal() {
            localStorage.setItem(`step-profile-${state.studentId}`, JSON.stringify(state.profileData));
            localStorage.setItem(`step-sessions-${state.studentId}`, JSON.stringify(state.sessions));
            localStorage.setItem('lastStudentId', state.studentId); // Mémoriser le dernier ID
        }

        function loadDataFromLocal() {
            const profile = localStorage.getItem(`step-profile-${state.studentId}`);
            const sessions = localStorage.getItem(`step-sessions-${state.studentId}`);
            if (profile) state.profileData = JSON.parse(profile);
            if (sessions) state.sessions = JSON.parse(sessions);
        }

        function loadData() {
            if (state.viewMode === 'student' && state.studentId) {
                if (isFirebaseReady) {
                    loadDataFromFirebase();
                } else {
                    loadDataFromLocal();
                    render();
                }
            }
        }

        function saveData() {
            saveDataToFirebase();
            // Passer automatiquement à la séance suivante si on n'est pas à la dernière
            if (state.currentPage > 0 && state.currentPage < 8) {
                setTimeout(() => {
                    state.currentPage++;
                    render();
                }, 500); // Petit délai pour voir le message de confirmation
            }
        }

        function resetData() {
            if (confirm('Réinitialiser toutes les données ?')) {
                if (isFirebaseReady) {
                    db.ref('students/' + state.studentId).remove()
                        .then(() => {
                            localStorage.removeItem(`step-profile-${state.studentId}`);
                            localStorage.removeItem(`step-sessions-${state.studentId}`);
                            resetStateData();
                            alert('✅ Données supprimées');
                        })
                        .catch((error) => {
                            console.error("Erreur suppression:", error);
                        });
                } else {
                    localStorage.removeItem(`step-profile-${state.studentId}`);
                    localStorage.removeItem(`step-sessions-${state.studentId}`);
                    resetStateData();
                    alert('✅ Données supprimées localement');
                }
            }
        }

        function resetStateData() {
            state.profileData = { nom: '', prenom: '', classe: '', age: '', sexe: 'garcon', fcRepos: '', theme: 'theme1' };
            state.sessions = Array(8).fill(null).map((_, i) => ({
                id: i + 1, date: '', locked: false, observationsProf: '',
                series: [
                    { num: 1, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 2, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 3, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 4, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 5, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 6, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 7, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' },
                    { num: 8, fcFin: '', hauteur: '', saut: '', bras: '', lest: '' }
                ],
                fcApres: '', souffle: '', transpiration: '', sensations: '', bilan: '',
                fcReussie: '', difficulteGlobale: '', fatigue: '', transpirationNiveau: ''
            }));
            render();
        }

        function getStudentsListFromFirebase(callback) {
            if (!isFirebaseReady) {
                callback(getStudentsListFromLocal());
                return;
            }

            db.ref('students').once('value').then((snapshot) => {
                const studentsData = [];
                snapshot.forEach((childSnapshot) => {
                    const id = childSnapshot.key;
                    const data = childSnapshot.val();
                    if (data.profile) {
                        studentsData.push({
                            id: id,
                            nom: data.profile.nom,
                            prenom: data.profile.prenom,
                            classe: data.profile.classe,
                            lastUpdate: data.lastUpdate
                        });
                    }
                });
                callback(studentsData);
            }).catch((error) => {
                console.error("Erreur chargement liste:", error);
                callback(getStudentsListFromLocal());
            });
        }

        function getStudentsListFromLocal() {
            const list = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('step-profile-')) {
                    const id = key.replace('step-profile-', '');
                    const profile = JSON.parse(localStorage.getItem(key));
                    list.push({ id, ...profile });
                }
            }
            return list;
        }


        // Vérifier si une séance est verrouillée
        function isSessionLocked(session) {
            // Verrouillage si l'élève a cliqué Enregistrer
            if (session.locked) {
                return true;
            }
            
            // OU verrouillage automatique 24h après la date de la séance
            if (session.date) {
                const sessionDate = new Date(session.date);
                const now = new Date();
                
                // Calculer la différence en heures
                const diffMs = now - sessionDate;
                const diffHours = diffMs / (1000 * 60 * 60);
                
                // Si plus de 24h après la date de la séance
                if (diffHours >= 24) {
                    return true;
                }
            }
            
            return false;
        }

        function calcFCMax() {
            if (!state.profileData.age) return '-';
            const age = parseInt(state.profileData.age);
            return state.profileData.sexe === 'garcon' ? 220 - age : 226 - age;
        }

        function calcFCReserve() {
            const fcMax = calcFCMax();
            const fcRepos = parseInt(state.profileData.fcRepos) || 0;
            return fcMax === '-' ? '-' : fcMax - fcRepos;
        }

        function calcFCE() {
            const fcReserve = calcFCReserve();
            const fcRepos = parseInt(state.profileData.fcRepos) || 0;
            if (fcReserve === '-') return '-';
            const pct = state.profileData.theme === 'theme1' ? 0.85 : 0.70;
            return Math.round(fcRepos + (fcReserve * pct));
        }

        function calcFCEMax() {
            const fcReserve = calcFCReserve();
            const fcRepos = parseInt(state.profileData.fcRepos) || 0;
            if (fcReserve === '-') return '-';
            if (state.profileData.theme === 'theme1') return '-';
            return Math.round(fcRepos + (fcReserve * 0.85));
        }

        function render() {
            const app = document.getElementById('app');
            const isTeacher = state.viewMode === 'teacher';
            const disabled = isTeacher ? 'disabled' : '';
            const disClass = isTeacher ? 'bg-gray-100' : '';

            let html = `
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white p-3 sm:p-4 rounded-lg shadow-lg mb-3 sm:mb-4">
                        <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 justify-center items-center">
                            <button onclick="switchMode('student')" class="w-full sm:w-auto px-4 sm:px-6 py-3 rounded-lg font-semibold text-sm sm:text-base ${state.viewMode === 'student' ? 'bg-blue-600 text-white' : 'bg-gray-200'}">
                                👁️ Mode Élève

                            </button>
                            ${isFirebaseReady ? '<span class="text-xs text-green-600">🟢 En ligne</span>' : '<span class="text-xs text-orange-600">🟠 Hors ligne</span>'}
                        </div>
                    </div>
            `;

            if (state.viewMode === 'student' && !state.studentId) {
                html += `
                    <div class="bg-white p-4 rounded-lg shadow-lg">
                        <label class="block text-sm font-semibold mb-2">Identifiant élève (ex: dupont_marie)</label>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input type="text" id="idInput" class="flex-1 border-2 border-gray-300 rounded px-3 py-3 text-base" placeholder="ex: dupont_marie">

                        <p class="text-xs text-blue-600 mt-1">💡 Si l'identifiant n'existe pas, un nouveau carnet sera créé</p>
                    </div>
                `;
            } else if (state.viewMode === 'teacher' && !state.studentId) {
                html += `<div class="bg-white p-4 sm:p-6 rounded-lg shadow-lg">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                        <h2 class="text-xl sm:text-2xl font-bold text-green-900">Liste des élèves</h2>
                        <button onclick="logoutTeacher()" class="w-full sm:w-auto px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600 text-sm">
                            🚪 Déconnexion
                        </button>
                    </div>
                    
                    <div class="mb-4 flex flex-col sm:flex-row gap-2">
                        <select id="classeFilter" onchange="filterByClasse()" class="flex-1 border-2 border-gray-300 rounded px-3 py-3 text-base">
                            <option value="">Toutes les classes</option>
                        </select>
                        <button onclick="refreshStudentsList()" class="px-4 py-3 bg-green-500 text-white rounded hover:bg-green-600 text-sm whitespace-nowrap">
                            🔄 Actualiser
                        </button>
                        <button onclick="deleteAllStudents()" class="px-4 py-3 bg-red-600 text-white rounded hover:bg-red-700 text-sm whitespace-nowrap">
                            🗑️ Tout supprimer
                        </button>
                    </div>
                    
                    <div id="studentsList">
                        <p class="text-center text-gray-500">Chargement...</p>
                    </div>
                </div>`;
            } else if (state.studentId) {
                if (state.currentPage === 0) {
                    html += renderProfilePage(isTeacher, disabled, disClass);
                } else {
                    html += renderSessionPage(state.sessions[state.currentPage - 1], isTeacher, disabled, disClass);

                html += `
                    <div class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-2 sm:gap-0 bg-white p-3 sm:p-4 rounded-lg shadow-lg">
                        <button onclick="prevPage()" ${state.currentPage === 0 ? 'disabled' : ''} class="px-4 py-3 bg-blue-500 text-white rounded disabled:bg-gray-300 text-sm sm:text-base order-1">← Précédent</button>

                            <span class="px-4 py-2 bg-blue-100 rounded font-semibold text-center text-sm sm:text-base">${state.currentPage === 0 ? 'Profil' : `Séance ${state.currentPage}/8`}</span>

                                <button onclick="saveData()" class="px-4 py-3 bg-green-500 text-white rounded text-sm sm:text-base">💾 Enregistrer</button>
                                <button onclick="resetData()" class="px-4 py-3 bg-red-500 text-white rounded text-sm sm:text-base">🔄 Reset</button>

            }

            html += `</div>`;
            app.innerHTML = html;

            if (state.viewMode === 'teacher' && !state.studentId) {
                loadStudentsList();
            }
        }

        function renderProfilePage(isTeacher, disabled, disClass) {
            return `
                <div class="bg-white p-4 sm:p-6 rounded-lg shadow-lg mb-3 sm:mb-4">
                    <h1 class="text-2xl sm:text-3xl font-bold text-center mb-4 sm:mb-6 text-blue-900">CARNET DE SUIVI - STEP BAC PRO</h1>
                    ${isTeacher ? `<div class="bg-green-100 border-2 border-green-500 rounded p-3 mb-4">
                        <p class="text-xs sm:text-sm font-semibold text-green-800">📋 Consultation professeur - ${state.studentId}</p>
                    </div>` : ''}
                    
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                        <div><label class="block text-sm font-semibold mb-1">Nom</label>
                            <input type="text" onchange="updateProfile('nom', this.value)" value="${state.profileData.nom}" ${disabled} class="w-full border-2 rounded px-3 py-3 text-base ${disClass}"></div>
                        <div><label class="block text-sm font-semibold mb-1">Prénom</label>
                            <input type="text" onchange="updateProfile('prenom', this.value)" value="${state.profileData.prenom}" ${disabled} class="w-full border-2 rounded px-3 py-3 text-base ${disClass}"></div>
                        <div><label class="block text-sm font-semibold mb-1">Classe</label>
                            <select onchange="updateProfile('classe', this.value)" ${disabled} class="w-full border-2 rounded px-3 py-3 text-base ${disClass}">
                                <option value="">-- Choisir --</option>
                                <option value="TermA" ${state.profileData.classe === 'TermA' ? 'selected' : ''}>Term A</option>
                                <option value="TermB" ${state.profileData.classe === 'TermB' ? 'selected' : ''}>Term B</option>
                                <option value="TermC" ${state.profileData.classe === 'TermC' ? 'selected' : ''}>Term C</option>
                            </select></div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                        <div><label class="block text-sm font-semibold mb-1">Âge</label>
                            <input type="number" onchange="updateProfile('age', this.value); render();" value="${state.profileData.age}" ${disabled} class="w-full border-2 rounded px-3 py-3 text-base ${disClass}"></div>
                        <div><label class="block text-sm font-semibold mb-1">Sexe</label>
                            <select onchange="updateProfile('sexe', this.value); render();" ${disabled} class="w-full border-2 rounded px-3 py-3 text-base ${disClass}">
                                <option value="garcon" ${state.profileData.sexe === 'garcon' ? 'selected' : ''}>Garçon</option>
                                <option value="fille" ${state.profileData.sexe === 'fille' ? 'selected' : ''}>Fille</option>

                        <div><label class="block text-sm font-semibold mb-1">FC Repos (bpm)</label>
                            <input type="number" onchange="updateProfile('fcRepos', this.value); render();" value="${state.profileData.fcRepos}" ${disabled} class="w-full border-2 rounded px-3 py-3 text-base ${disClass}"></div>

                            </div>

                    </div>

                    <div class="mb-6">

                        ${state.profileData.theme && !isTeacher ? `
                            <div class="w-full border-2 rounded px-3 py-3 text-base bg-gray-100 text-gray-700 cursor-not-allowed border-gray-300">
                                🔒 ${state.profileData.theme === 'theme1' ? 'Thème 1 - Effort bref et intense (≥85% FCR)' : 'Thème 2 - Effort long et soutenu (70-85% FCR)'}

                            <li><strong>FCMax:</strong> Filles = 226 - âge | Garçons = 220 - âge</li>
                            <li><strong>FC Réserve:</strong> FCMax - FC Repos</li>

        function renderSessionPage(s, isTeacher, disabled, disClass) {
            const isTheme1 = state.profileData.theme === 'theme1';
            const isLocked = !isTeacher && isSessionLocked(s);

        function loadStudentsList() {
            getStudentsListFromFirebase((students) => {
                state.allStudents = students;
                displayStudentsList();
            });
        }

        function displayStudentsList() {
            const listDiv = document.getElementById('studentsList');
            if (!listDiv) return;

            let filteredStudents = state.allStudents;
            if (state.selectedClasse) {
                filteredStudents = state.allStudents.filter(s => s.classe === state.selectedClasse);
            }

            // Mettre à jour le filtre de classe
            const classeFilter = document.getElementById('classeFilter');
            if (classeFilter) {
                const classes = [...new Set(state.allStudents.map(s => s.classe).filter(c => c))];
                classeFilter.innerHTML = '<option value="">Toutes les classes</option>' +
                    classes.sort().map(c => `<option value="${c}" ${state.selectedClasse === c ? 'selected' : ''}>${c}</option>`).join('');
            }

            if (filteredStudents.length === 0) {
                listDiv.innerHTML = '<p class="text-center text-gray-500 py-8">Aucun carnet enregistré</p>';
            } else {
                listDiv.innerHTML = filteredStudents.map(s => `
                    <div class="border-2 rounded-lg p-3 sm:p-4 mb-3 hover:border-blue-400">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                            <div class="flex-1">
                                <h3 class="font-bold text-base sm:text-lg">${s.nom} ${s.prenom}</h3>
                                <p class="text-xs sm:text-sm text-gray-600">Classe: ${s.classe}</p>
                                <p class="text-xs text-gray-500">ID: ${s.id}</p>
                                ${s.lastUpdate ? `<p class="text-xs text-gray-400">Dernière MAJ: ${new Date(s.lastUpdate).toLocaleString('fr-FR')}</p>` : ''}
                            </div>
                            <div class="flex gap-2 w-full sm:w-auto">
                                <button onclick="viewStudent('${s.id}')" class="flex-1 sm:flex-none px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 text-sm">📖 Consulter</button>
                                <button onclick="printStudent('${s.id}')" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 text-sm">🖨️</button>
                                <button onclick="deleteStudent('${s.id}', '${s.nom} ${s.prenom}')" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 text-sm">🗑️</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function filterByClasse() {
            const select = document.getElementById('classeFilter');
            state.selectedClasse = select ? select.value : '';
            displayStudentsList();
        }

        function deleteStudent(studentId, studentName) {
            if (!confirm(`Voulez-vous vraiment supprimer le carnet de ${studentName} ?`)) {
                return;
            }

            if (isFirebaseReady) {
                db.ref('students/' + studentId).remove()
                    .then(() => {
                        localStorage.removeItem(`step-profile-${studentId}`);
                        localStorage.removeItem(`step-sessions-${studentId}`);
                        alert('✅ Carnet supprimé');
                        refreshStudentsList();
                    })
                    .catch((error) => {
                        console.error("Erreur suppression:", error);
                        alert('❌ Erreur lors de la suppression');
                    });
            } else {
                localStorage.removeItem(`step-profile-${studentId}`);
                localStorage.removeItem(`step-sessions-${studentId}`);
                alert('✅ Carnet supprimé localement');
                refreshStudentsList();
            }
        }

        function deleteAllStudents() {
            if (!confirm('⚠️ ATTENTION ! Voulez-vous vraiment supprimer TOUS les carnets ?\n\nCette action est irréversible !')) {
                return;
            }

            if (!confirm('Êtes-vous ABSOLUMENT SÛR ? Tous les carnets de tous les élèves seront supprimés définitivement !')) {
                return;
            }

            if (isFirebaseReady) {
                db.ref('students').remove()
                    .then(() => {
                        // Supprimer aussi en local
                        for (let i = localStorage.length - 1; i >= 0; i--) {
                            const key = localStorage.key(i);
                            if (key.startsWith('step-profile-') || key.startsWith('step-sessions-')) {
                                localStorage.removeItem(key);
                            }
                        }
                        alert('✅ Tous les carnets ont été supprimés');
                        refreshStudentsList();
                    })
                    .catch((error) => {
                        console.error("Erreur suppression globale:", error);
                        alert('❌ Erreur lors de la suppression');
                    });
            } else {
                for (let i = localStorage.length - 1; i >= 0; i--) {
                    const key = localStorage.key(i);
                    if (key.startsWith('step-profile-') || key.startsWith('step-sessions-')) {
                        localStorage.removeItem(key);
                    }
                }
                alert('✅ Tous les carnets ont été supprimés localement');
                refreshStudentsList();
            }
        }

        function refreshStudentsList() {
            const listDiv = document.getElementById('studentsList');
            if (listDiv) listDiv.innerHTML = '<p class="text-center text-gray-500">Actualisation...</p>';
            loadStudentsList();
        }

        function switchMode(mode) {
            if (mode === 'teacher' && !state.isTeacherAuthenticated) {
                alert('🔒 Accès refusé. Veuillez utiliser le bouton Mode Professeur pour vous authentifier.');
                return;
            }
            state.viewMode = mode;
            state.studentId = '';
            state.currentPage = 0;
            render();
        }

        function attemptTeacherMode() {
            if (state.isTeacherAuthenticated) {
                // Déjà authentifié, basculer en mode professeur
                switchModeDirectly('teacher');
                return;
            }

            // Demander le mot de passe
            const password = prompt('🔒 Mode Professeun\nVeuillez entrer le mot de passe :');
            
            if (password === null) {
                // Utilisateur a annulé
                return;
            }

            if (password === TEACHER_PASSWORD) {
                state.isTeacherAuthenticated = true;
                alert('✅ Authentification réussie !');
                switchModeDirectly('teacher');
            } else {
                alert('❌ Mot de passe incorrect !');
            }
        }

        function switchModeDirectly(mode) {
            state.viewMode = mode;
            state.studentId = '';
            state.currentPage = 0;
            render();
        }

        function logoutTeacher() {
            state.isTeacherAuthenticated = false;
            switchModeDirectly('student');
            alert('👋 Déconnexion du mode professeur');
        }

        function loadStudent() {
            const id = document.getElementById('idInput').value.trim().toLowerCase();
            if (id) {
                state.studentId = id;
                loadData();
            }
        }

        function loadOrCreateStudent() {
            const id = document.getElementById('idInput').value.trim().toLowerCase();
            if (!id) {
                alert('⚠️ Veuillez entrer un identifiant');
                return;
            }
            
            state.studentId = id;
            
            // Charger les données existantes ou créer un nouveau carnet
            if (isFirebaseReady) {
                db.ref('students/' + id).once('value').then((snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // Carnet existant
                        if (data.profile) state.profileData = data.profile;
                        if (data.sessions) state.sessions = data.sessions;
                    } else {
                        // Nouveau carnet - réinitialiser les données
                        resetStateData();
                        // Mettre la date du jour sur toutes les séances
                        const today = new Date().toISOString().split('T')[0];
                        state.sessions.forEach(session => {
                            session.date = today;
                        });
                    }
                    render();
                }).catch((error) => {
                    console.error("Erreur:", error);
                    loadDataFromLocal();
                    render();
                });
            } else {
                // Mode hors ligne
                const profile = localStorage.getItem(`step-profile-${id}`);
                if (profile) {
                    loadDataFromLocal();
                } else {
                    resetStateData();
                    // Mettre la date du jour sur toutes les séances
                    const today = new Date().toISOString().split('T')[0];
                    state.sessions.forEach(session => {
                        session.date = today;
                    });
                }
                render();
            }
        }

        function viewStudent(id) {
            state.studentId = id;
            state.currentPage = 0;
            
            if (isFirebaseReady) {
                db.ref('students/' + id).once('value').then((snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        if (data.profile) state.profileData = data.profile;
                        if (data.sessions) state.sessions = data.sessions;
                    }
                    render();
                }).catch((error) => {
                    console.error("Erreur:", error);
                    loadDataFromLocal();
                    render();
                });
            } else {
                loadDataFromLocal();
                render();
            }
        }

        function updateProfile(field, value) {
            state.profileData[field] = value;
        }

        function updateSession(id, field, value) {
            const idx = state.sessions.findIndex(s => s.id === id);
            if (idx !== -1) state.sessions[idx][field] = value;
        }

        function updateSerie(sessionId, serieNum, field, value) {
            const idx = state.sessions.findIndex(s => s.id === sessionId);
            if (idx !== -1) {
                const serieIdx = state.sessions[idx].series.findIndex(s => s.num === serieNum);
                if (serieIdx !== -1) state.sessions[idx].series[serieIdx][field] = value;
            }
        }

        function prevPage() {
            if (state.currentPage > 0) {
                state.currentPage--;
                render();
            }
        }

        function nextPage() {
            console.log('SUIVANT cliqué - Page:', state.currentPage);
            if (state.currentPage < 8) {
                state.currentPage++;
                console.log('Nouvelle page:', state.currentPage);
                render();
            }
        }

        function printStudent(studentId) {
            // Charger les données de l'élève
            if (isFirebaseReady) {
                db.ref('students/' + studentId).once('value').then((snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        generatePrintView(studentId, data);
                    } else {
                        alert('❌ Données non trouvées');
                    }
                }).catch((error) => {
                    console.error("Erreur chargement:", error);
                    alert('❌ Erreur lors du chargement');
                });
            } else {
                // Charger depuis localStorage
                const profile = localStorage.getItem(`step-profile-${studentId}`);
                const sessions = localStorage.getItem(`step-sessions-${studentId}`);
                if (profile && sessions) {
                    const data = {
                        profile: JSON.parse(profile),
                        sessions: JSON.parse(sessions)
                    };
                    generatePrintView(studentId, data);
                } else {
                    alert('❌ Données non trouvées localement');
                }
            }
        }

        function generatePrintView(studentId, data) {
            // Créer une nouvelle fenêtre pour l'impression
            const printWindow = window.open('', '_blank');
            
            const profile = data.profile;
            const sessions = data.sessions;
            
            // Calculer FCMax et FCE
            const age = parseInt(profile.age) || 0;
            const sexe = profile.sexe || 'garcon';
            const fcRepos = parseInt(profile.fcRepos) || 60;
            const fcMax = sexe === 'garcon' ? (220 - age) : (226 - age);
            const fcReserve = fcMax - fcRepos;
            const fce = Math.round(fcRepos + (fcReserve * 0.7));
            
            let html = `

`;

            // Pour chaque séance
            sessions.forEach((session, idx) => {
                if (session.date) { // Seulement si la séance a été remplie

                    <td>${serie.saut === 'oui' ? '✓' : serie.saut === 'non' ? '✗' : '-'}</td>
                    <td>${serie.bras === 'oui' ? '✓' : serie.bras === 'non' ? '✗' : '-'}</td>

                </tr>`;
                        }

                    html += `

            <br><strong>Difficulté :</strong> ${session.difficulteGlobale === 'facile' ? '😊 Facile' : session.difficulteGlobale === 'moyen' ? '😐 Moyen' : session.difficulteGlobale === 'difficile' ? '😰 Difficile' : '-'}

        function saveTeacherModifications() {
            if (!confirm('Sauvegarder les modifications apportées au carnet de cet élève ?\n\n⚠️ Utilisez cette fonction uniquement en cas de triche ou d\'erreur avérée.')) {
                return;
            }
            
            console.log('💾 Professeur sauvegarde les modifications pour:', state.studentId);
            
            // Sauvegarder sans verrouiller
            saveDataToFirebase();
            
            alert('✅ Modifications sauvegardées !\n\nLe carnet de l\'élève a été mis à jour.');
        }


        function unlockSessionForStudent(sessionId) {
            if (!confirm('Déverrouiller cette séance ?\n\nL\'élève pourra la modifier à nouveau.')) {
                return;
            }
            
            const sessionIndex = sessionId - 1;
            state.sessions[sessionIndex].locked = false;
            
            console.log('🔓 Séance', sessionId, 'déverrouillée par le prof');
            
            saveDataToFirebase();
            alert('✅ Séance déverrouillée !\n\nL\'élève peut maintenant la modifier.');
            render();
        }

        function unlockSession(sessionId) {
            if (!confirm('Êtes-vous sûr de vouloir déverrouiller cette séance ?\n\nL\'élève pourra la modifier à nouveau.')) {
                return;
            }
            
            const sessionIndex = sessionId - 1;
            state.sessions[sessionIndex].locked = false;
            
            console.log('🔓 Séance', sessionId, 'déverrouillée par le professeur');
            
            // Sauvegarder immédiatement
            saveDataToFirebase();
            
            alert('✅ Séance déverrouillée !\n\nL\'élève peut maintenant la modifier.');
            
            render();
        }

        function backToTeacherList() {
            state.studentId = '';
            state.currentPage = 0;
            render();
        }

        // Sauvegarde automatique toutes les 30 secondes (seulement en mode élève)
        setInterval(() => {
            if (state.viewMode === 'student' && state.studentId && state.currentPage > 0) {
                console.log('💾 Sauvegarde automatique silencieuse...');
                
                // Afficher l'indicateur
                const indicator = document.getElementById('autoSaveIndicator');
                if (indicator) {
                    indicator.classList.remove('hidden');
                    indicator.textContent = '⏳ Sauvegarde...';
                }
                
                // Sauvegarder localement
                saveDataToLocal();
                
                // Sauvegarder sur Firebase (sans alert)
                if (isFirebaseReady) {
                    const dataToSave = {
                        profile: state.profileData,
                        sessions: state.sessions,
                        lastUpdate: new Date().toISOString()
                    };
                    
                    db.ref('students/' + state.studentId).set(dataToSave)
                        .then(() => {
                            console.log('✅ Auto-save Firebase OK');
                            if (indicator) {
                                indicator.textContent = '✅ Sauvegardé';
                                indicator.classList.add('bg-green-100', 'text-green-700');
                                indicator.classList.remove('bg-gray-100', 'text-gray-600');
                                // Masquer après 2 secondes
                                setTimeout(() => {
                                    indicator.classList.add('hidden');
                                    indicator.classList.remove('bg-green-100', 'text-green-700');
                                    indicator.classList.add('bg-gray-100', 'text-gray-600');
                                }, 2000);
                            }
                        })
                        .catch((error) => {
                            console.error('❌ Auto-save Firebase erreur:', error);
                            if (indicator) {
                                indicator.textContent = '⚠️ Sauvegarde locale seulement';
                                indicator.classList.add('bg-yellow-100', 'text-yellow-700');
                                indicator.classList.remove('bg-gray-100', 'text-gray-600');
                                setTimeout(() => {
                                    indicator.classList.add('hidden');
                                    indicator.classList.remove('bg-yellow-100', 'text-yellow-700');
                                    indicator.classList.add('bg-gray-100', 'text-gray-600');
                                }, 3000);
                            }
                        });
                } else {
                    // Pas de Firebase
                    if (indicator) {
                        indicator.textContent = '✅ Sauvegarde locale';
                        setTimeout(() => indicator.classList.add('hidden'), 2000);
                    }
                }
            }
        }, 30000); // 30 secondes

        // Charger les données au démarrage si un ID est en localStorage
        window.addEventListener('load', () => {
            const lastStudentId = localStorage.getItem('lastStudentId');
            if (lastStudentId && state.viewMode === 'student') {
                state.studentId = lastStudentId;
                loadDataFromLocal();
                render();
            }
        });

        render();
    </script>
